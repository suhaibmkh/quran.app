<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>القرآن الكريم</title>
    <link href="https://fonts.googleapis.com/css2?family=Cairo:wght@400;600;700&display=swap" rel="stylesheet">
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body { font-family: 'Cairo', sans-serif; background: #f5f5f5; color: #333; }
        header { background: #2D9E6F; color: white; padding: 20px; text-align: center; }
        main { max-width: 1200px; margin: 20px auto; display: grid; grid-template-columns: 250px 1fr; gap: 20px; padding: 0 20px; }
        aside { background: white; padding: 20px; border-radius: 8px; max-height: 500px; overflow-y: auto; }
        .content { background: white; padding: 20px; border-radius: 8px; }
        h2 { margin-bottom: 15px; }
        button { padding: 10px 15px; margin: 5px; border: none; border-radius: 5px; cursor: pointer; background: #2D9E6F; color: white; font-weight: bold; }
        .verse { background: #f9f9f9; padding: 15px; margin: 15px 0; border-radius: 5px; }
        .verse-text { font-size: 16px; margin-bottom: 10px; }
        .loading { text-align: center; padding: 20px; font-size: 14px; }
        .error { color: red; padding: 10px; background: #fee2e2; border-radius: 5px; }
    </style>
</head>
<body>
    <header>
        <h1>📖 القرآن الكريم</h1>
    </header>

    <main>
        <aside>
            <h2>السور</h2>
            <div id="chapters"><div class="loading">جاري التحميل...</div></div>
        </aside>

        <article class="content">
            <h2 id="title">جاري التحميل...</h2>
            <div id="verses"><div class="loading">جاري تحميل الآيات...</div></div>
        </article>
    </main>

    <script>
        let chapters = [];
        let verses = {};
        let current = 1;

        // تحميل السور
        function loadChapters() {
            console.log('جاري التحميل...');
            fetch('https://api.quran.cloud/v1/chapters')
                .then(r => r.json())
                .then(d => {
                    chapters = d.data;
                    console.log('✓ تم تحميل ' + chapters.length + ' سورة');
                    showChapters();
                    loadVerses(1);
                })
                .catch(e => {
                    console.error(e);
                    document.getElementById('chapters').innerHTML = '<div class="error">❌ خطأ في التحميل</div>';
                });
        }

        // عرض السور
        function showChapters() {
            let html = '';
            for (let ch of chapters) {
                html += '<button onclick="loadVerses(' + ch.number + ')">' + ch.name + '</button>';
            }
            document.getElementById('chapters').innerHTML = html;
        }

        // تحميل الآيات
        function loadVerses(id) {
            current = id;
            let ch = chapters.find(c => c.number == id);
            if (!ch) return;
            
            document.getElementById('title').textContent = ch.name + ' (' + ch.numberOfAyahs + ')';
            
            if (verses[id]) {
                showVerses();
                return;
            }

            console.log('جاري تحميل آيات السورة ' + id);
            fetch('https://api.quran.cloud/v1/quran/quran-' + id)
                .then(r => r.json())
                .then(d => {
                    verses[id] = d.data.ayahs;
                    console.log('✓ تم تحميل ' + verses[id].length + ' آية');
                    showVerses();
                })
                .catch(e => {
                    console.error(e);
                    document.getElementById('verses').innerHTML = '<div class="error">❌ خطأ</div>';
                });
        }

        // عرض الآيات
        function showVerses() {
            let versesList = verses[current];
            if (!versesList) return;
            
            let html = '';
            for (let v of versesList.slice(0, 10)) {
                html += '<div class="verse">';
                html += '<div class="verse-text">' + v.text + '</div>';
                html += '<div style="opacity:0.6; font-size:12px;">﴿' + v.numberInSurah + '﴾</div>';
                html += '</div>';
            }
            document.getElementById('verses').innerHTML = html;
        }

        // ابدأ
        window.onload = loadChapters;
    </script>
</body>
</html>
